name: Morning Report

on:
  schedule:
    # 台灣時間 06:00 = UTC 22:00 (前一日)
    # GitHub Actions 排程通常延遲 5-15 分鐘，故實際收信約 06:05-06:20
    # 週日 22:00 UTC → 週一 06:00 TPE   (週末綜合報)
    # 週一 22:00 UTC → 週二 06:00 TPE   (報週一晚的美股)
    # 週二 22:00 UTC → 週三 06:00 TPE
    # 週三 22:00 UTC → 週四 06:00 TPE
    # 週四 22:00 UTC → 週五 06:00 TPE
    # 週五 22:00 UTC → 週六 06:00 TPE   (報週五晚收盤)
    - cron: "0 22 * * 0,1,2,3,4,5"
  workflow_dispatch:   # 允許手動觸發測試

permissions:
  contents: write   # 允許 push 回 state/history.json

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0    # 完整歷史，避免 push 衝突

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run morning report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # 收件者可設在 GitHub Variables（vars）或 Secrets；支援多位，以逗號分隔。
          RECIPIENT: ${{ vars.RECIPIENT || secrets.RECIPIENT }}

          # ===== LLM 切換 =====
          # 可選值：
          #   "deepseek"  → DeepSeek V3.2/V4（推薦，NT$3/月，中文超強）
          #   "gemini"    → Gemini 2.5 Flash（免費，品質中等）
          #   "anthropic" → Claude Sonnet 4.6（NT$46/月，品質最佳）
          LLM_PROVIDER: deepseek

          # DeepSeek（推薦）— 走 OpenAI 相容 API
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 模型選項：
          #   deepseek-v4-pro    → V4 旗艦版（推薦，分析最深，支援思考模式）
          #   deepseek-v4-flash  → V4 輕量版（便宜，品質尚可）
          DEEPSEEK_MODEL: deepseek-v4-pro
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          # 思考模式強度：high / medium / low；設 off 可關閉（僅 v4-pro/reasoner 生效）
          DEEPSEEK_REASONING_EFFORT: high

          # Gemini（免費備援，可留空）
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash

          # Anthropic Claude（付費高品質，可留空）
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-6

          # SEC EDGAR User-Agent 聯絡信箱（選填，不設則自動用 GMAIL_USER）
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}

          TZ: Asia/Taipei
        run: python morning_report.py
